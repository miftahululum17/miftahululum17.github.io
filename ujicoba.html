<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Cuan App - Fix Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg: #f8f9fa; }
        body { background-color: var(--tg-theme-bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: auto; min-height: 100vh; position: relative; background: white; }
        .page { display: none; padding: 20px; animation: fadeIn 0.2s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .admin-card { border-left: 5px solid #0d6efd; transition: transform 0.2s; }
        .admin-card:active { transform: scale(0.98); }
        .point-badge { background: #ffc107; color: #000; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-primary mb-2"></div>
    <div class="small fw-bold">Memproses...</div>
</div>

<div class="app-container">
    <!-- Halaman Home (Ringkasan) -->
    <div id="page-home" class="page active">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">Dashboard</h4>
            <div class="point-badge" onclick="loadAdminData()">Admin Panel ⚙️</div>
        </div>
        <div class="card card-custom p-4 text-center" onclick="showPage('page-admin')">
            <div class="fs-1">👥</div>
            <div class="fw-bold mt-2">Kelola Pengguna</div>
            <div class="text-muted small">Edit poin, status, atau hapus user</div>
        </div>
    </div>

    <!-- Halaman Admin Panel -->
    <div id="page-admin" class="page">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button onclick="showPage('page-home')" class="btn btn-sm btn-light">← Kembali</button>
            <h5 class="fw-bold m-0">USER MANAGEMENT</h5>
            <button onclick="loadAdminData()" class="btn btn-sm btn-outline-primary">🔄</button>
        </div>

        <div class="input-group mb-3 shadow-sm">
            <span class="input-group-text bg-white border-end-0">🔍</span>
            <input type="text" id="search-user" class="form-control border-start-0" placeholder="Cari berdasarkan nama..." oninput="handleSearchUser(this.value)">
        </div>

        <div id="admin-user-list">
            <!-- Data user akan muncul di sini -->
            <div class="text-center py-5 text-muted">Klik tombol refresh untuk memuat data...</div>
        </div>
    </div>
</div>

<!-- Modal Edit User -->
<div class="modal fade" id="modalEditUser" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered p-3">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Detail Pengguna</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-u-id">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Username</label>
                    <input type="text" id="edit-u-name" class="form-control bg-light" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Saldo Poin</label>
                    <input type="number" id="edit-u-poin" class="form-control">
                </div>
                <div class="form-check form-switch p-0 ms-4">
                    <input class="form-check-input" type="checkbox" id="edit-u-status">
                    <label class="form-check-label fw-bold small" for="edit-u-status">Blokir / Tangguhkan Akun</label>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-danger btn-sm me-auto" onclick="confirmDeleteUser()">Hapus Akun</button>
                <button type="button" class="btn btn-primary btn-sm px-4" onclick="saveUserEdit()">Simpan</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Ganti dengan URL Web App Anda yang valid
    const API_URL = "URL_WEB_APP_GAS_ANDA"; 
    
    let allUsers = []; // Variabel global untuk menyimpan data user

    // Fungsi Navigasi
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'page-admin') loadAdminData();
    }

    // Fungsi panggil API
    async function callAPI(action, payload = {}) {
        const loader = document.getElementById('loadingOverlay');
        loader.style.display = 'flex';
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action, payload })
            });
            const data = await response.json();
            return data;
        } catch (error) {
            console.error("API Error:", error);
            return { success: false, message: "Koneksi ke server gagal" };
        } finally {
            loader.style.display = 'none';
        }
    }

    // Load Data dari Database
    async function loadAdminData() {
        const res = await callAPI('adminGetData');
        if(res && res.success) {
            // Pastikan data users ada, jika tidak set array kosong
            allUsers = res.users || [];
            renderUserList(allUsers);
        } else {
            document.getElementById('admin-user-list').innerHTML = `<div class="alert alert-danger">Gagal memuat data: ${res.message || 'Error'}</div>`;
        }
    }

    // Fungsi Pencarian
    function handleSearchUser(query) {
        const filtered = allUsers.filter(u => 
            (u.username && u.username.toLowerCase().includes(query.toLowerCase())) ||
            (u.id && u.id.toString().includes(query))
        );
        renderUserList(filtered);
    }

    // Render HTML Daftar User
    function renderUserList(users) {
        const container = document.getElementById('admin-user-list');
        
        if (!users || users.length === 0) {
            container.innerHTML = '<div class="text-center mt-5 text-muted">Data pengguna tidak ditemukan.</div>';
            return;
        }

        container.innerHTML = users.map(u => {
            // Cek jika data undefined, berikan nilai default agar tidak muncul tulisan "undefined" di UI
            const name = u.username || "Tanpa Nama";
            const poin = u.poin !== undefined ? u.poin : 0;
            const id = u.id || "N/A";
            const isBlocked = u.status === 'blocked';

            return `
                <div class="card card-custom admin-card p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div style="flex: 1;">
                            <div class="fw-bold">${name} ${isBlocked ? '<span class="badge bg-danger" style="font-size:0.6rem">BLOCKED</span>' : ''}</div>
                            <div class="text-muted" style="font-size:0.75rem">ID: ${id} | Poin: <span class="text-primary fw-bold">${poin}</span></div>
                        </div>
                        <button class="btn btn-sm btn-primary" onclick="openEditUserModal('${id}')">Edit</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Buka Modal Edit
    function openEditUserModal(uid) {
        console.log("Mencoba edit user ID:", uid);
        
        // Cari user di array local (Gunakan == untuk fleksibilitas tipe data string/number)
        const user = allUsers.find(x => x.id == uid);
        
        if(!user) {
            alert("Data user tidak ditemukan di sistem local. Coba refresh data.");
            return;
        }

        // Isi data ke modal
        document.getElementById('edit-u-id').value = user.id;
        document.getElementById('edit-u-name').value = user.username || "N/A";
        document.getElementById('edit-u-poin').value = user.poin || 0;
        document.getElementById('edit-u-status').checked = (user.status === 'blocked');

        // Tampilkan modal
        const myModal = new bootstrap.Modal(document.getElementById('modalEditUser'));
        myModal.show();
    }

    // Simpan Perubahan ke Database
    async function saveUserEdit() {
        const id = document.getElementById('edit-u-id').value;
        const payload = {
            id: id,
            poin: parseInt(document.getElementById('edit-u-poin').value),
            status: document.getElementById('edit-u-status').checked ? 'blocked' : 'active'
        };

        const res = await callAPI('adminUpdateUser', payload);
        if(res.success) {
            // Tutup modal
            const modalEl = document.getElementById('modalEditUser');
            const modalInstance = bootstrap.Modal.getInstance(modalEl);
            modalInstance.hide();
            
            // Refresh data terbaru
            loadAdminData();
        } else {
            alert("Gagal menyimpan: " + res.message);
        }
    }

    // Hapus User
    async function confirmDeleteUser() {
        const id = document.getElementById('edit-u-id').value;
        if(confirm(`Apakah Anda yakin ingin menghapus user dengan ID ${id} secara permanen?`)) {
            const res = await callAPI('adminDeleteUser', { id: id });
            if(res.success) {
                const modalEl = document.getElementById('modalEditUser');
                bootstrap.Modal.getInstance(modalEl).hide();
                loadAdminData();
            } else {
                alert("Gagal menghapus: " + res.message);
            }
        }
    }
</script>

</body>
</html>
